version: '3.9'

services:
  abrinay:
    build: .
    ports:
      - "3001:3001"
      - "8080:8080"
    volumes:
      # Persistir SQLite fuera del contenedor
      - abrinay-data:/app/apps/agent-system/data
    environment:
      NODE_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      WS_PORT: 8080
      AGENT_SERVER_PORT: 3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  abrinay-data:
    driver: local
